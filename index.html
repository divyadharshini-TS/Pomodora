<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Pomodoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-zinc-800 p-8 rounded-[2rem] shadow-2xl w-96 text-center border border-zinc-700">
        <div class="flex justify-around mb-8 bg-zinc-900 p-1 rounded-full">
            <button id="work-btn" class="px-4 py-2 rounded-full text-sm font-medium bg-red-500 text-white transition-all">Focus</button>
            <button id="break-btn" class="px-4 py-2 rounded-full text-sm font-medium hover:bg-zinc-700 transition-all">Break</button>
        </div>

        <div class="mb-8">
            <h1 id="timer" class="text-8xl font-bold tracking-tighter tabular-nums">25:00</h1>
            <p id="mode-text" class="text-zinc-500 uppercase tracking-widest text-xs mt-2">Time to Focus</p>
        </div>

        <div class="flex flex-col gap-4">
            <button id="start-stop" class="w-full py-4 rounded-2xl bg-white text-black font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all">
                START
            </button>
            <button id="reset" class="text-zinc-500 hover:text-white text-sm font-medium transition-colors">
                Reset Timer
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
